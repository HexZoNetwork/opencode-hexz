title = "opencode-hexz gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Cybersecurity training content uses demo/redacted credentials."
paths = [
  '''src/cybersecurity/skills-mukul/.*''',
]
regexes = [
  '''REDACTED''',
  '''YOUR_KEY''',
  '''\*\*\*''',
  '''misp\.example\.com''',
  '''target\.com''',
  '''target\.example\.com''',
  '''api\.passiv''',
  '''api\.abuseipdb\.com''',
  '''api\.virustotal\.com''',
  '''Sec-WebSocket-Key''',
  '''osquery''',
]

[[allowlists]]
description = "Private key regex patterns in redaction/sanitization code."
paths = [
  '''src/hexz-mimo\.ts''',
  '''src/hexz\.ts''',
]

[[allowlists]]
description = "JWT and AWS example tokens in training materials."
regexes = [
  '''eyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+''',
  '''AKIA''',
  '''GPP_AES_KEY''',
]
