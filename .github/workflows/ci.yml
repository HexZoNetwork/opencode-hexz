name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bash -n install.sh

      - run: bash -n uninstall.sh

      - run: bun audit

      - run: bun run lint

      - run: bun run build

      - run: bun test
